# Lokale Entwicklung: API + MongoDB. Postgres/Redis/Chroma aus früheren
# Planungen sind entfernt — der Code nutzt sie nicht.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      - mongo
    volumes:
      - ./backend:/app/backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
